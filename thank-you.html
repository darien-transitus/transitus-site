    <title>Thank you - Transitus</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

    <style>
        :root{
            --navy:#2B4C7E;--navy-deep:#1d3556;--cream:#f6f3ec;--paper:#fffdf9;--surface:#ffffff;
            --ink:#1b1a16;--ink-soft:#52504a;--muted:#8d8b80;--line:#e8e3d7;--line-soft:#f0ece1;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
            color:var(--ink);background:var(--paper);line-height:1.6;
            min-height:100vh;display:flex;flex-direction:column;
        }
        .wrap{max-width:1120px;margin:0 auto;padding:0 24px;width:100%}
        header{border-bottom:1px solid var(--line);background:var(--surface)}
        .nav{display:flex;align-items:center;justify-content:space-between;padding:18px 24px}
        .brand{display:flex;align-items:center;gap:11px;text-decoration:none}
        .brand svg{width:34px;height:18px}
        .brand-name{font-family:'Newsreader',serif;font-weight:600;font-size:22px;letter-spacing:0.02em;color:var(--navy)}
        .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:15px;text-decoration:none;padding:11px 20px;border-radius:9px;transition:.2s}
        .btn-primary{background:var(--navy);color:#fff}
        .btn-primary:hover{background:var(--navy-deep)}
        .arr{transition:transform .2s}
        .btn-primary:hover .arr{transform:translateX(3px)}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:72px 24px}
        .ty{max-width:600px;text-align:center}
        .ty-check{width:60px;height:60px;border-radius:50%;background:#e9f1e7;display:flex;align-items:center;justify-content:center;margin:0 auto 26px}
        .ty-check svg{width:30px;height:30px;stroke:#3c6b2c;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
        .ty h1{font-family:'Newsreader',serif;font-weight:600;font-size:40px;line-height:1.15;color:var(--navy);margin-bottom:18px;letter-spacing:-0.01em}
        .ty .lede{font-size:19px;color:var(--ink-soft);margin-bottom:16px}
        .ty .sub{font-size:16px;color:var(--muted);margin-bottom:32px}
        .ty .back{display:inline-flex;align-items:center;gap:7px;color:var(--navy);font-weight:600;font-size:15px;text-decoration:none}
        .ty .back:hover{text-decoration:underline}
        footer{border-top:1px solid var(--line);background:var(--surface);padding:26px 0}
        .foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
        .foot .brand-name{font-size:19px}
        .foot-meta{color:var(--muted);font-size:14px}
        .foot-meta a{color:var(--muted)}
        @media(max-width:600px){
            .ty h1{font-size:31px}
            .ty .lede{font-size:17px}
            main{padding:48px 24px}
        }
    </style>
</head>
<body>
    <header>
        <div class="wrap nav">
            <a href="/" class="brand" aria-label="Transitus home">
                <svg viewBox="-2 0 34 16" fill="none" stroke="#2B4C7E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><circle cx="3" cy="8" r="2.5" fill="#2B4C7E"/><line x1="6" y1="8" x2="26" y2="8"/><polyline points="22,3 28,8 22,13"/></svg>
                <span class="brand-name">Transitus</span>
            </a>
            <a href="/your-options" class="btn btn-primary">See my options <span class="arr">&rarr;</span></a>
        </div>
    </header>

    <main>
        <div class="ty">
            <div class="ty-check">
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h1>Thank you for trusting us.</h1>
            <a href="/" class="back">&larr; Back to Transitus home</a>
        </div>
    </main>

    <footer>
        <div class="wrap foot">
            <span class="brand-name">Transitus</span>
            <span class="foot-meta">&copy; 2026 Transitus, LLC &middot; <a href="/privacy">Privacy</a> &middot; Denver, Colorado</span>
        </div>
    </footer>
</body>
</html>
